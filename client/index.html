<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <title>Nexora</title>

    <meta name="theme-color" content="#17212b" />
    <meta name="description" content="Быстрый и удобный мессенджер" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Nexora" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Android PWA -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Тёмный фон + лого сразу в HTML, без ожидания JS/CSS — иначе на
         медленном соединении первый кадр белый (браузер по умолчанию),
         прежде чем подключится App.css. Это отдельный элемент, а НЕ внутри
         #root, чтобы не сломать проверку самолечения ниже (она считает
         childElementCount у #root, а не у этого сплэша). Пропадает через
         window.__appMounted сразу после первого рендера React. -->
    <style>
      html, body { background: #0a0e14; }
      #boot-splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; align-items: center; justify-content: center;
        background: #0a0e14;
      }
      #boot-splash img {
        width: 72px; height: 72px; border-radius: 50%;
        animation: bootPulse 1.4s ease-in-out infinite;
      }
      @keyframes bootPulse {
        0%, 100% { opacity: 0.55; transform: scale(0.92); }
        50%      { opacity: 1;    transform: scale(1); }
      }
    </style>
  </head>
  <body>
    <div id="boot-splash"><img src="/icon-512.png" alt="" /></div>
    <div id="root"></div>
    <!-- Самолечение белого экрана: если бандл не загрузился (404 после деплоя),
         один раз чистим кэш + SW и перезагружаемся. Флаг в sessionStorage от цикла. -->
    <script>
      (function () {
        function selfHeal(why) {
          if (sessionStorage.getItem('healed')) return;
          sessionStorage.setItem('healed', '1');
          Promise.resolve()
            .then(function () { return 'caches' in window ? caches.keys().then(function (ks) { return Promise.all(ks.map(function (k) { return caches.delete(k); })); }) : null; })
            .then(function () { return navigator.serviceWorker ? navigator.serviceWorker.getRegistrations().then(function (rs) { return Promise.all(rs.map(function (r) { return r.unregister(); })); }) : null; })
            .finally(function () { location.reload(true); });
        }
        // Ошибка загрузки скрипта/чанка
        window.addEventListener('error', function (e) {
          if (e && e.target && e.target.tagName === 'SCRIPT') selfHeal('script-error');
        }, true);
        // Если за 8 секунд React так и не отрисовал содержимое — лечимся
        window.addEventListener('load', function () {
          setTimeout(function () {
            var root = document.getElementById('root');
            if (root && root.childElementCount === 0) selfHeal('empty-root');
          }, 8000);
        });
        // Успешный рендер — сбрасываем флаг, чтобы лечение работало и в будущем,
        // и убираем сплэш (React уже отрисовал реальный контент в #root).
        window.__appMounted = function () {
          sessionStorage.removeItem('healed');
          var splash = document.getElementById('boot-splash');
          if (splash) splash.remove();
        };
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
